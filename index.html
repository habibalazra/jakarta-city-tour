<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jalan Jalan di Jakarta Bersama Elsa</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            cyan: '#06b6d4',
                            indigo: '#6366f1',
                            pink: '#ec4899'
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-white/70 backdrop-blur-md border border-white/50 shadow-sm;
            }
            .glass-panel-dark {
                @apply bg-slate-900/80 backdrop-blur-xl border border-slate-800 shadow-lg;
            }
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background-color: #475569;
        }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen transition-colors duration-500 pb-24">
    <div id="root" class="max-w-md mx-auto min-h-screen shadow-xl bg-slate-50 overflow-hidden relative"></div>
    <script>
      // Manually fetch and compile app.jsx with classic JSX runtime
      // Babel standalone's auto-processing defaults to automatic runtime which
      // generates imports that browsers can't resolve
      fetch('app.jsx')
        .then(r => r.text())
        .then(code => {
          const result = Babel.transform(code, {
            presets: [['react', { runtime: 'classic' }]]
          });
          const script = document.createElement('script');
          script.textContent = result.code;
          document.body.appendChild(script);
        })
        .catch(err => console.error('Failed to load app:', err));
    </script>
</body>
</html>
